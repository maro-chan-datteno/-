<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakeibo</title>

<style>
:root{
  --bg:#f4f5f7;
  --panel:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#d7dce2;
  --income:#2563eb;
  --expense:#dc2626;
  --budget:#d97706;
  --actual:#0f766e;
  --diary:#16a34a;
  --plan:#7c3aed;
  --dark:#374151;
  --soft-income:#f3f7ff;
  --soft-expense:#fff5f5;
  --soft-budget:#fff8ed;
  --soft-actual:#f0faf7;
  --soft-plan:#f6f2ff;
  --soft-gray:#f8f9fb;
  --summary:#f1f5f9;
  --accordion:#f8fafc;
  --calendar:#ffffff;
  --modal:#ffffff;
  --hover:#eef2f7;
  --placeholder:#9ca3af;
  --tag-bg:#eef2f7;
  --button-text:#ffffff;
  --shadow:0 14px 36px rgba(31,41,55,.09);
  --focus-ring:0 0 0 3px rgba(37,99,235,.14);
}

body[data-theme="minimal"]{
  --bg:#f3f4f6;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111827;
  --muted:#4b5563;
  --subtext:#4b5563;
  --line:#d1d5db;
  --accent:#2563eb;
  --income:#2563eb;
  --expense:#dc2626;
  --budget:#d97706;
  --actual:#059669;
  --diary:#16a34a;
  --plan:#8b5cf6;
  --dark:#374151;
  --soft-income:#eff6ff;
  --soft-expense:#fff1f2;
  --soft-budget:#fff7ed;
  --soft-actual:#ecfdf5;
  --soft-plan:#f5f3ff;
  --soft-gray:#f9fafb;
  --summary:#f1f5f9;
  --accordion:#f8fafc;
  --calendar:#ffffff;
  --modal:#ffffff;
  --hover:#e5e7eb;
  --placeholder:#6b7280;
  --tag-bg:#eef2f7;
  --button-text:#ffffff;
  --shadow:0 14px 36px rgba(31,41,55,.09);
  --focus-ring:0 0 0 3px rgba(37,99,235,.14);
}

body[data-theme="tokyo"]{
  --bg:#111827;
  --panel:#1f2937;
  --card:#1f2937;
  --text:#f9fafb;
  --muted:#d1d5db;
  --subtext:#d1d5db;
  --line:#374151;
  --accent:#60a5fa;
  --income:#60a5fa;
  --expense:#f87171;
  --budget:#fbbf24;
  --actual:#34d399;
  --diary:#4ade80;
  --plan:#c084fc;
  --dark:#0f172a;
  --soft-income:#172554;
  --soft-expense:#451a1a;
  --soft-budget:#422006;
  --soft-actual:#064e3b;
  --soft-plan:#3b0764;
  --soft-gray:#273449;
  --summary:#243041;
  --accordion:#273549;
  --calendar:#1f2937;
  --modal:#1f2937;
  --hover:#334155;
  --placeholder:#9ca3af;
  --tag-bg:#374151;
  --button-text:#ffffff;
  --shadow:0 18px 48px rgba(0,0,0,.28);
  --focus-ring:0 0 0 3px rgba(96,165,250,.22);
}

body[data-theme="paper"]{
  --bg:#f6f1e7;
  --panel:#fffdf8;
  --card:#fffdf8;
  --text:#3f3a34;
  --muted:#6b6257;
  --subtext:#6b6257;
  --line:#d8cfc2;
  --accent:#8b5cf6;
  --income:#4f6fbd;
  --expense:#b45353;
  --budget:#b7791f;
  --actual:#4d7c5f;
  --diary:#5f8c5a;
  --plan:#8b5cf6;
  --dark:#5f5449;
  --soft-income:#f1edff;
  --soft-expense:#fff4ee;
  --soft-budget:#fff6df;
  --soft-actual:#eef7ef;
  --soft-plan:#f4efff;
  --soft-gray:#fbf7ee;
  --summary:#f2eadc;
  --accordion:#f7efe2;
  --calendar:#fffdf8;
  --modal:#fffdf8;
  --hover:#eee2d1;
  --placeholder:#8a8175;
  --tag-bg:#f0e8db;
  --button-text:#ffffff;
  --shadow:0 14px 30px rgba(63,58,52,.10);
  --focus-ring:0 0 0 3px rgba(139,92,246,.16);
}

body[data-theme="retro"]{
  --bg:#cad2a0;
  --panel:#dde5b6;
  --card:#dde5b6;
  --text:#23301b;
  --muted:#3f5a2a;
  --subtext:#3f5a2a;
  --line:#7b8f52;
  --accent:#556b2f;
  --income:#405d27;
  --expense:#7b2f2f;
  --budget:#6f5f1e;
  --actual:#3f6b34;
  --diary:#426d31;
  --plan:#4e5f2d;
  --dark:#23301b;
  --soft-income:#c3d39b;
  --soft-expense:#dcc09a;
  --soft-budget:#e5d58d;
  --soft-actual:#c5dba1;
  --soft-plan:#c8d49f;
  --soft-gray:#d5deb0;
  --summary:#c0cc8d;
  --accordion:#cbd69d;
  --calendar:#d5deb0;
  --modal:#dde5b6;
  --hover:#c0cc8d;
  --placeholder:#4f6635;
  --tag-bg:#c3ce94;
  --button-text:#f3f8d8;
  --shadow:4px 4px 0 rgba(35,48,27,.25);
  --focus-ring:0 0 0 3px rgba(85,107,47,.28);
}

*,
*::before,
*::after{box-sizing:border-box;}

html{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  padding:12px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow-x:hidden;
  transition:background-color .25s ease,color .25s ease;
}

body,
button,
.calendar-day,
.entry-chip,
.history-card{
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

button{
  -webkit-tap-highlight-color:transparent;
}

input,
textarea,
select{
  -webkit-user-select:text;
  user-select:text;
  -webkit-touch-callout:default;
}

input::placeholder,
textarea::placeholder{
  color:var(--placeholder);
}

.app{
  width:100%;
  max-width:1320px;
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,430px) minmax(0,1fr);
  gap:18px;
  align-items:start;
  min-width:0;
}

.panel{
  min-width:0;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px;
  box-shadow:var(--shadow);
  transition:background-color .25s ease,border-color .25s ease,box-shadow .25s ease,color .25s ease;
}

.right-panel{
  display:grid;
  gap:18px;
  min-width:0;
}

.calendar-panel{
  position:sticky;
  top:12px;
  z-index:1;
}

h1,h2,h3{line-height:1.25;}

.panel-title{
  margin:0 0 14px;
  font-size:22px;
}

.menu-title{
  margin:22px 0 8px;
  padding:13px 14px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--soft-gray);
  color:var(--text);
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(31,41,55,.05);
}

.menu-title::after{
  content:"開く";
  float:right;
  color:var(--muted);
  font-size:12px;
}

.menu-title.open::after{
  content:"閉じる";
}

.menu-title.budget-title{background:var(--soft-budget);}
.menu-title.actual-title{background:var(--soft-actual);}
.menu-title.fixed-title{background:#eef2f7;}
.menu-title.diary-title{background:#effaf3;}
.menu-title.plan-title{background:var(--soft-plan);}

.menu-body{
  display:none;
  padding:4px 0 10px;
}

.menu-body.open{
  display:block;
}

.section-title{
  margin:0 0 12px;
  font-size:18px;
}

button{
  max-width:100%;
  min-height:44px;
  border:0;
  border-radius:13px;
  color:var(--button-text);
  font-weight:850;
  cursor:pointer;
  touch-action:manipulation;
  white-space:normal;
  line-height:1.2;
  transition:background-color .25s ease,color .25s ease,border-color .25s ease,box-shadow .25s ease;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.full-button{
  width:100%;
  min-width:0;
  margin-top:7px;
  padding:12px;
  font-size:15px;
}

.mini-button{
  width:auto;
  max-width:100%;
  min-height:34px;
  padding:7px 10px;
  font-size:12px;
}

.btn-income{background:var(--income);}
.btn-expense{background:var(--expense);}
.btn-budget{background:var(--budget);}
.btn-actual{background:var(--actual);}
.btn-diary{background:var(--diary);}
.btn-plan{background:var(--plan);}
.btn-delete{background:#4b5563;}
.btn-month{background:var(--dark);}
.btn-light{
  background:var(--tag-bg);
  color:var(--text);
  border:1px solid var(--line);
}

input,select,textarea{
  width:100%;
  max-width:100%;
  min-width:0;
  min-height:44px;
  margin-bottom:10px;
  padding:12px;
  border:2px solid var(--line);
  border-radius:13px;
  background:var(--panel);
  color:var(--text);
  font-size:16px;
}

label{
  display:block;
  margin:4px 0 6px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

textarea{
  min-height:118px;
  resize:vertical;
}

.entry-form{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .25s ease,opacity .2s ease,padding .2s ease,margin .2s ease;
}

.entry-form.show{
  max-height:1000px;
  opacity:1;
  margin-top:8px;
  padding:12px;
  border-radius:16px;
  border:2px solid var(--line);
  background:var(--soft-gray);
}

.entry-form.budget.show{
  border-color:var(--budget);
  background:var(--soft-budget);
}

.entry-form.actual.show{
  border-color:var(--actual);
  background:var(--soft-actual);
}

.entry-form.diary.show{
  border-color:var(--diary);
  background:#f0fdf4;
}

.entry-form.plan.show{
  border-color:var(--plan);
  background:var(--soft-plan);
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  min-width:0;
}

.form-grid > *,
.summary-grid > *,
.month-nav > *{
  min-width:0;
}

.theme-box{
  margin:0 0 16px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--soft-gray);
}

.theme-box label{
  margin-top:0;
}

.theme-buttons{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:6px;
}

.theme-buttons button{
  min-height:40px;
  padding:8px 6px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  font-size:12px;
}

.theme-buttons button.active{
  border-color:var(--accent);
  background:var(--accent);
  color:var(--button-text);
}

body[data-theme="retro"] .mini-button,
body[data-theme="retro"] .tag,
body[data-theme="retro"] .theme-buttons button{
  border-radius:4px;
  box-shadow:2px 2px 0 rgba(35,48,27,.22);
}

body[data-theme="retro"] .dot{
  border-radius:2px;
}

.weekday-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:6px;
  margin-bottom:10px;
}

.weekday-grid label{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  margin:0;
  padding:8px 4px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
  color:var(--text);
  font-size:13px;
}

.weekday-grid input{
  width:auto;
  min-height:0;
  margin:0 4px 0 0;
}

.repeat-fields{
  display:none;
}

.repeat-fields.show{
  display:block;
}

.month-nav{
  display:grid;
  grid-template-columns:minmax(44px,48px) minmax(0,1fr) minmax(44px,48px);
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.month-nav h2{
  margin:0;
  text-align:center;
  font-size:22px;
  overflow-wrap:anywhere;
}

.summary{
  display:grid;
  gap:10px;
  margin-bottom:14px;
}

.summary-main{
  min-width:0;
  padding:14px;
  border-radius:16px;
  background:var(--summary);
  border:1px solid var(--line);
  color:var(--text);
}

.summary-main h3{
  margin:0 0 10px;
  font-size:17px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
  min-width:0;
}

.summary-card{
  min-width:0;
  padding:10px;
  border-radius:14px;
  background:var(--card);
  border:1px solid var(--line);
}

.summary-card span{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.summary-card strong{
  display:block;
  margin-top:4px;
  font-size:17px;
  overflow-wrap:anywhere;
}

.summary-balance{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--line);
  font-weight:900;
}

.analysis-box{
  margin-top:12px;
  border-top:1px solid var(--line);
  padding-top:10px;
}

.analysis-toggle{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--accordion);
  color:var(--text);
  font-size:15px;
  font-weight:900;
  text-align:left;
  transition:background-color .2s ease,border-color .2s ease,transform .2s ease;
}

.analysis-toggle:hover,
.analysis-toggle.open{
  background:var(--hover);
  border-color:var(--accent);
}

.analysis-toggle::before{
  content:"▶";
  color:var(--muted);
  margin-right:6px;
}

.analysis-toggle.open::before{
  content:"▼";
}

.analysis-content{
  display:none;
  padding-top:10px;
}

.analysis-content.open{
  display:block;
}

.analysis-lead{
  margin:0 0 10px;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.progress-bar{
  position:relative;
  width:100%;
  height:12px;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--soft-gray);
  margin:7px 0 5px;
}

.progress-fill{
  height:100%;
  border-radius:999px;
  background:var(--actual);
  transition:width .25s ease,background-color .25s ease;
}

.progress-fill.over{
  background:var(--expense);
}

.analysis-row{
  display:block;
  padding:10px 0;
  border-bottom:1px solid var(--line);
  font-size:13px;
}

.analysis-row:last-child{
  border-bottom:0;
}

.analysis-name{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  min-width:0;
  font-weight:900;
}

.analysis-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  flex:0 0 auto;
}

.analysis-over{
  color:var(--expense);
  font-weight:900;
}

.analysis-meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px 12px;
  color:var(--muted);
  line-height:1.5;
}

.analysis-warning{
  margin-top:5px;
  color:var(--expense);
  font-weight:900;
}

.plus{color:var(--income);}
.minus{color:var(--expense);}
.budget-text{color:var(--budget);}
.actual-text{color:var(--actual);}

#calendar{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:6px;
}

.week-name{
  padding:4px 0;
  color:var(--muted);
  text-align:center;
  font-size:13px;
  font-weight:900;
}

.calendar-day{
  min-width:0;
  min-height:138px;
  padding:7px;
  border:1px solid var(--line);
  border-radius:13px;
  background:var(--calendar);
  color:var(--text);
  overflow:hidden;
  cursor:pointer;
  transition:background-color .2s ease,border-color .2s ease,box-shadow .2s ease,transform .2s ease;
}

.calendar-day:hover{
  background:var(--hover);
}

.calendar-day.today{
  border:2px solid var(--income);
}

.calendar-day.selected{
  border:3px solid var(--income);
  background:var(--soft-income);
  box-shadow:var(--focus-ring);
}

.calendar-date{
  margin-bottom:6px;
  font-weight:950;
}

.day-total{
  display:grid;
  gap:3px;
  margin-bottom:5px;
  font-size:12px;
}

.day-total-row{
  display:flex;
  justify-content:space-between;
  gap:4px;
  min-width:0;
}

.day-total-row span{
  min-width:0;
  overflow-wrap:anywhere;
}

.day-dots{
  display:grid;
  gap:3px;
  margin-top:5px;
  color:var(--muted);
  font-size:10px;
}

.dot-line{
  display:flex;
  align-items:center;
  gap:3px;
  min-width:0;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  flex:0 0 auto;
}

.dot.budget{background:var(--budget);}
.dot.actual{background:var(--actual);}
.dot.fixed{background:var(--income);}

.entry-chip{
  display:grid;
  gap:2px;
  min-width:0;
  max-width:100%;
  margin-top:5px;
  padding:6px;
  border-radius:11px;
  font-size:12px;
  border:1px solid #fed7aa;
  background:rgba(255,247,237,.85);
  overflow:hidden;
}

.entry-chip.actual{
  border-color:#bbf7d0;
  background:rgba(236,253,245,.88);
}

.entry-chip.income{
  border-color:#bfdbfe;
  background:rgba(239,246,255,.90);
}

.entry-title{
  font-weight:900;
  overflow-wrap:anywhere;
}

.entry-meta{
  color:var(--muted);
  font-size:11px;
  overflow-wrap:anywhere;
}

.entry-actions,.detail-actions,.modal-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:7px;
  min-width:0;
}

.entry-actions > *,
.detail-actions > *,
.modal-actions > *{
  flex:1 1 auto;
  min-width:96px;
}

.detail-panel{
  max-height:360px;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}

.detail-header{
  position:sticky;
  top:0;
  z-index:1;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  padding-bottom:10px;
  margin-bottom:10px;
  background:var(--modal);
  border-bottom:1px solid var(--line);
}

.detail-group{
  margin-bottom:14px;
}

.detail-group h3{
  margin:0 0 8px;
  font-size:16px;
}

.detail-item,.history-card,.diary-card{
  margin-bottom:8px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:15px;
  background:var(--card);
  color:var(--text);
}

.detail-item.budget{
  background:var(--soft-budget);
}

.detail-item.actual{
  background:var(--soft-actual);
}

.history-card{
  display:grid;
  gap:5px;
}

.history-head{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:13px;
}

.history-title{
  font-weight:950;
  overflow-wrap:anywhere;
}

.history-amount{
  font-size:20px;
  font-weight:950;
}

.tag-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  width:max-content;
  max-width:100%;
  padding:3px 8px;
  border-radius:999px;
  background:var(--tag-bg);
  font-size:12px;
  color:var(--text);
}

.diary-card{
  border-left:5px solid var(--diary);
  background:var(--soft-actual);
}

.plan-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.accordion-panel{
  overflow:hidden;
}

.accordion-title{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--accordion);
  color:var(--text);
  font-size:18px;
  font-weight:900;
  text-align:left;
  transition:background-color .2s ease,border-color .2s ease,box-shadow .2s ease;
}

.accordion-title:hover,
.accordion-title.open{
  background:var(--hover);
  border-color:var(--accent);
  box-shadow:var(--focus-ring);
}

.accordion-title::before{
  content:"▶";
  color:var(--muted);
  font-size:14px;
}

.accordion-title.open::before{
  content:"▼";
}

.accordion-content{
  display:none;
}

.accordion-content.open{
  display:block;
  padding-top:10px;
}

.plan-card{
  min-width:0;
  padding:14px;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--card);
  box-shadow:0 8px 22px rgba(31,41,55,.07);
}

.plan-card.done{
  background:linear-gradient(180deg,var(--soft-actual),var(--panel));
  border-color:rgba(15,118,110,.35);
}

.plan-card h3{
  margin:0 0 8px;
  font-size:17px;
  overflow-wrap:anywhere;
}

.plan-meta{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.plan-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.plan-actions > *{
  flex:1 1 auto;
  min-width:86px;
}

#moodSelect{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:10px;
}

#moodSelect button{
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  font-size:22px;
}

#moodSelect button.active{
  border:2px solid var(--diary);
  background:var(--soft-actual);
}

.empty{
  padding:14px;
  border:1px dashed var(--line);
  border-radius:13px;
  color:var(--muted);
  text-align:center;
}

.modal-backdrop{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(15,23,42,.42);
  z-index:20;
}

.modal-backdrop.show{
  display:flex;
}

.modal{
  width:min(720px,90vw);
  min-width:0;
  max-height:88vh;
  overflow:auto;
  padding:18px;
  border-radius:22px;
  background:var(--modal);
  border:1px solid var(--line);
  color:var(--text);
  box-shadow:0 24px 60px rgba(15,23,42,.28);
}

.modal h2{
  margin:0 0 14px;
}

@media(max-width:1080px){
  .app{
    grid-template-columns:1fr;
  }

  .calendar-panel{
    position:static;
  }
}

@media(max-width:760px){
  body{padding:8px;}

  .panel{
    padding:clamp(10px,3vw,14px);
    border-radius:16px;
  }

  .form-grid,.summary-grid{
    grid-template-columns:1fr;
  }

  .month-nav{
    grid-template-columns:44px minmax(0,1fr) 44px;
    gap:6px;
  }

  .calendar-day{
    min-height:104px;
    padding:4px;
    font-size:clamp(10px,2.5vw,11px);
    border-radius:10px;
  }

  .day-total,.entry-chip{
    font-size:clamp(9px,2.4vw,10px);
  }

  .entry-meta{
    font-size:clamp(9px,2.3vw,10px);
  }

  .mini-button{
    min-height:34px;
    padding:7px 9px;
    font-size:12px;
  }

  .month-nav h2{
    font-size:clamp(16px,4vw,18px);
  }

  .weekday-grid{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }

  .plan-grid{
    grid-template-columns:1fr;
  }

  #calendar{
    gap:4px;
  }
}

@media(max-width:520px){
  .summary-grid,.form-grid{
    grid-template-columns:1fr;
  }

  .app{
    gap:10px;
  }

  .calendar-day{
    min-height:92px;
  }

  .entry-chip{
    padding:4px;
  }

  .entry-actions > *,
  .detail-actions > *,
  .modal-actions > *,
  .plan-actions > *{
    min-width:100%;
  }
}
</style>
</head>

<body>
<div class="app">
  <section class="panel">

        <button type="button" data-theme-button="tokyo" onclick="changeTheme('tokyo')">Tokyo</button>
        <button type="button" data-theme-button="paper" onclick="changeTheme('paper')">Paper</button>
        <button type="button" data-theme-button="retro" onclick="changeTheme('retro')">Retro</button>
      </div>
    </div>

    <div class="menu-title">予算メニュー</div>
    <button class="full-button btn-budget" onclick="openForm('budgetIncomeForm')">予算収入</button>

    <button class="full-button btn-budget" onclick="openForm('budgetExpenseForm')">予算支出</button>
    <form id="budgetExpenseForm" class="entry-form budget" onsubmit="saveFormTransaction(event,'budgetExpenseForm','budget','expense','none')"></form>

    <div class="menu-title">実績メニュー</div>
    <button class="full-button btn-actual" onclick="openForm('actualIncomeForm')">実績収入</button>
    <form id="actualIncomeForm" class="entry-form actual" onsubmit="saveFormTransaction(event,'actualIncomeForm','actual','income','none')"></form>

    <button class="full-button btn-actual" onclick="openForm('actualExpenseForm')">実績支出</button>
    <form id="actualExpenseForm" class="entry-form actual" onsubmit="saveFormTransaction(event,'actualExpenseForm','actual','expense','none')"></form>

    <div class="menu-title">固定費メニュー</div>
    <button class="full-button btn-income" onclick="openForm('fixedMonthlyForm')">毎月自動発生</button>
    <form id="fixedMonthlyForm" class="entry-form budget" onsubmit="saveFormTransaction(event,'fixedMonthlyForm','budget','expense','monthly')"></form>

    <button class="full-button btn-income" onclick="openForm('fixedYearlyForm')">毎年自動発生</button>
    <form id="fixedYearlyForm" class="entry-form budget" onsubmit="saveFormTransaction(event,'fixedYearlyForm','budget','expense','yearly')"></form>

    <button class="full-button btn-income" onclick="openForm('fixedDailyForm')">毎日自動発生</button>
    <form id="fixedDailyForm" class="entry-form budget" onsubmit="saveFormTransaction(event,'fixedDailyForm','budget','expense','daily')"></form>

    <button class="full-button btn-income" onclick="openForm('fixedWeeklyForm')">毎週自動発生</button>
    <form id="fixedWeeklyForm" class="entry-form budget" onsubmit="saveFormTransaction(event,'fixedWeeklyForm','budget','expense','weekly')"></form>

    <div class="menu-title">日記メニュー</div>
    <button class="full-button btn-diary" onclick="openForm('diaryForm')">日記を書く</button>
    <div id="diaryForm" class="entry-form diary">
      <div id="moodSelect">
        <button type="button" onclick="selectMood(this,'😊')">😊</button>
        <button type="button" onclick="selectMood(this,'😐')">😐</button>
        <button type="button" onclick="selectMood(this,'😓')">😓</button>
        <button type="button" onclick="selectMood(this,'😡')">😡</button>
      </div>
      <input type="hidden" id="diaryEditId">
      <input type="hidden" id="mood">
      <textarea id="diaryInput" placeholder="今日の出来事"></textarea>
      <button class="full-button btn-diary" onclick="saveDiary()" type="button">日記保存</button>
    </div>

    <div class="menu-title">計画メニュー</div>
    <button class="full-button btn-plan" onclick="openPlanForm('buy')">計画を追加</button>
    <button class="full-button btn-light" onclick="showPlanModal()">計画リストを見る</button>
    <form id="planForm" class="entry-form plan" onsubmit="savePlan(event)">
      <input type="hidden" id="planEditId">
      <label for="planTitle">タイトル</label>
      <input id="planTitle" placeholder="Nintendo Switch、北海道旅行など" required>
      <label for="planType">種類</label>
      <select id="planType">
        <option value="buy">買いたいもの</option>
        <option value="goal">やりたいこと</option>
      </select>
      <label for="planTargetAmount">必要金額</label>
      <input id="planTargetAmount" type="number" placeholder="120000" required>
      <label for="planCategory">カテゴリ</label>

      <label for="planMemo">メモ</label>
      <textarea id="planMemo" placeholder="理由、時期、準備メモなど"></textarea>
      <button class="full-button btn-plan" type="submit">保存</button>

  </section>

  <section class="right-panel">
    <div class="panel calendar-panel">
      <div class="month-nav">
        <button class="btn-month" onclick="changeMonth(-1)" aria-label="前の月">‹</button>

    <div class="panel accordion-panel">

<div id="dateDetailModal" class="modal-backdrop" onclick="closeDateDetailModal(event)">

</div>

<div id="planModal" class="modal-backdrop" onclick="closePlanModal(event)">

  </div>
</div>

<div id="editModal" class="modal-backdrop" onclick="closeEditModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>取引を編集</h2>
    <form id="editForm" onsubmit="saveEditTransaction(event)">
      <input type="hidden" id="editId">

      <div class="form-grid">
        <div>
          <label for="editMode">区分</label>
          <select id="editMode">
            <option value="budget">予算</option>
            <option value="actual">実績</option>
          </select>
        </div>
        <div>
          <label for="editType">種別</label>
          <select id="editType">
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div>
          <label for="editDate">日付</label>
          <input type="date" id="editDate" required>
        </div>

          <label for="editAmount">金額</label>
          <input type="number" id="editAmount" required>
        </div>
      </div>

      <label for="editTitle">内容</label>
      <input id="editTitle" required>

      <label for="editCategory">カテゴリ</label>

      <select id="editPlanId"></select>

      <label for="editRepeat">繰り返し</label>

        <option value="daily">毎日</option>
        <option value="weekly">毎週</option>
        <option value="monthly">毎月</option>
        <option value="yearly">毎年</option>

        <div class="form-grid">
          <div>
            <label for="editYearlyMonth">毎年何月</label>
            <select id="editYearlyMonth"></select>
          </div>
          <div>
            <label for="editYearlyDay">毎年何日</label>
            <input type="number" min="1" max="31" id="editYearlyDay">

      <div class="modal-actions">
        <button class="mini-button btn-actual" type="submit">更新</button>
        <button class="mini-button btn-delete" type="button" onclick="deleteFromEditModal()">削除</button>
        <button class="mini-button btn-light" type="button" onclick="hideEditModal()">閉じる</button>

<script>
// ============================================================
// 予算 vs 実績 家計簿
// - transactions に予算/実績/繰り返しを統一保存
// - 日付クリックで選択日詳細を表示
// - 詳細/履歴/モーダルから編集・削除
// - サーバ不要、localStorageのみ
// ============================================================

const STORAGE = {
  transactions: 'transactions',
  diaries: 'diaries',
  planList: 'planList',
  theme: 'kakeiboTheme'
};

const CATEGORIES = ['食費','日用品','交通費','娯楽','固定費','給与','旅行','ゲーム','学習','美容','健康','その他'];
const CATEGORY_COLORS = {
  '食費':'#f59e0b',
  '固定費':'#3b82f6',
  'ゲーム':'#8b5cf6',
  '趣味':'#8b5cf6',
  '娯楽':'#8b5cf6',
  '交通':'#10b981',
  '交通費':'#10b981',
  '日用品':'#ef4444',
  '旅行':'#06b6d4',
  '学習':'#6366f1',
  '美容':'#ec4899',
  '健康':'#059669',
  'その他':'#6b7280'
};
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const THEMES = {
  blue:{
    '--bg':'#f4f5f7',
    '--panel':'#ffffff',
    '--text':'#1f2937',
    '--muted':'#6b7280',
    '--line':'#d7dce2',
    '--income':'#2563eb',
    '--expense':'#dc2626',
    '--budget':'#d97706',
    '--actual':'#0f766e',
    '--diary':'#16a34a',
    '--plan':'#7c3aed',
    '--dark':'#263241',
    '--soft-income':'#eff6ff',
    '--soft-expense':'#fff1f2',
    '--soft-budget':'#fff7ed',
    '--soft-actual':'#ecfdf5',
    '--soft-plan':'#f6f2ff',
    '--soft-gray':'#f8fafc',
    '--focus-ring':'0 0 0 3px rgba(37,99,235,.14)'
  },
  green:{
    '--bg':'#f3f8f4',
    '--panel':'#ffffff',
    '--text':'#1f2937',
    '--muted':'#66736c',
    '--line':'#d4e3d9',
    '--income':'#15803d',
    '--expense':'#dc2626',
    '--budget':'#ca8a04',
    '--actual':'#047857',
    '--diary':'#16a34a',
    '--plan':'#6d7f3f',
    '--dark':'#1f3a2e',
    '--soft-income':'#f0fdf4',
    '--soft-expense':'#fff1f2',
    '--soft-budget':'#fefce8',
    '--soft-actual':'#ecfdf5',
    '--soft-plan':'#f4f3ff',
    '--soft-gray':'#f7fbf8',
    '--focus-ring':'0 0 0 3px rgba(21,128,61,.15)'
  },
  purple:{
    '--bg':'#f7f5fb',
    '--panel':'#ffffff',
    '--text':'#28243a',
    '--muted':'#746b82',
    '--line':'#ded7ea',
    '--income':'#7c3aed',
    '--expense':'#dc2626',
    '--budget':'#d97706',
    '--actual':'#6d28d9',
    '--diary':'#16a34a',
    '--plan':'#7c3aed',
    '--dark':'#34294f',
    '--soft-income':'#f5f3ff',
    '--soft-expense':'#fff1f2',
    '--soft-budget':'#fff7ed',
    '--soft-actual':'#f5f3ff',
    '--soft-plan':'#f6f2ff',
    '--soft-gray':'#faf7ff',
    '--focus-ring':'0 0 0 3px rgba(124,58,237,.15)'
  },
  orange:{
    '--bg':'#fbf7f2',
    '--panel':'#ffffff',
    '--text':'#2f261d',
    '--muted':'#7b6a58',
    '--line':'#ead9c5',
    '--income':'#2563eb',
    '--expense':'#dc2626',
    '--budget':'#ea580c',
    '--actual':'#0f766e',
    '--diary':'#16a34a',
    '--plan':'#a855f7',
    '--dark':'#3b2c22',
    '--soft-income':'#eff6ff',
    '--soft-expense':'#fff1f2',
    '--soft-budget':'#fff7ed',
    '--soft-actual':'#ecfdf5',
    '--soft-plan':'#f8f2ff',
    '--soft-gray':'#fffaf4',
    '--focus-ring':'0 0 0 3px rgba(234,88,12,.15)'
  },
  dark:{
    '--bg':'#111827',
    '--panel':'#1f2937',
    '--text':'#f9fafb',
    '--muted':'#d1d5db',
    '--line':'#374151',
    '--income':'#60a5fa',
    '--expense':'#f87171',
    '--budget':'#fbbf24',
    '--actual':'#34d399',
    '--diary':'#4ade80',
    '--plan':'#c084fc',
    '--dark':'#0f172a',
    '--soft-income':'#1e3a5f',
    '--soft-expense':'#4a1d2a',
    '--soft-budget':'#433414',
    '--soft-actual':'#12382f',
    '--soft-plan':'#31224a',
    '--soft-gray':'#273449',
    '--placeholder':'#9ca3af',
    '--tag-bg':'#374151',
    '--focus-ring':'0 0 0 3px rgba(96,165,250,.20)'
  }
};
const today = new Date().toISOString().split('T')[0];

let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();
let selectedDate = today;
let editingTransactionId = null;
let transactions = [];
let diaries = [];
let planList = [];

const getEl = id => document.getElementById(id);
const yen = value => `${value.toLocaleString()}円`;
const makeId = () => `tx_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;

function parseDate(dateString){
  const [year,month,day] = dateString.split('-').map(Number);
  return new Date(year,month - 1,day);
}

function toDateString(date){
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2,'0'),
    String(date.getDate()).padStart(2,'0')
  ].join('-');
}

function signedAmount(tx){
  return tx.type === 'expense' ? -Math.abs(tx.amount) : Math.abs(tx.amount);
}

function repeatLabel(tx){
  if(tx.repeat === 'daily') return '毎日';
  if(tx.repeat === 'weekly'){
    const days = normalizeWeeklyDays(tx.weeklyDays,parseDate(tx.date).getDay())
      .map(day => WEEKDAYS[day])
      .join('・');
    return `毎週 ${days}`;
  }
  if(tx.repeat === 'monthly') return `毎月${tx.monthlyDay}日`;
  if(tx.repeat === 'yearly') return `毎年${tx.yearlyMonth}月${tx.yearlyDay}日`;
  return 'この日だけ';
}

function normalizeWeeklyDays(days,fallbackDay){
  const normalized = Array.isArray(days)
    ? days.map(Number).filter(day => day >= 0 && day <= 6)
    : [];
  const unique = [...new Set(normalized)];
  return unique.length ? unique.sort((a,b) => a - b) : [fallbackDay];
}

function modeLabel(mode){
  return mode === 'budget' ? '予算' : '実績';
}

function typeLabel(type){
  return type === 'income' ? '収入' : '支出';
}

function isSameMonth(dateString,year,month){
  const date = parseDate(dateString);
  return date.getFullYear() === year && date.getMonth() === month;
}

function getMonthDayCount(year,month){
  return new Date(year,month + 1,0).getDate();
}

function getAnalysisCutoffDay(year,month){
  const now = parseDate(today);
  const lastDay = getMonthDayCount(year,month);

  if(year < now.getFullYear() || (year === now.getFullYear() && month < now.getMonth())){
    return lastDay;
  }

  if(year > now.getFullYear() || (year === now.getFullYear() && month > now.getMonth())){
    return 0;
  }

  return now.getDate();
}

function isOnOrBeforeCutoff(item,cutoffDay){
  if(cutoffDay <= 0) return false;
  return parseDate(item.occurrenceDate).getDate() <= cutoffDay;
}

function sumSigned(items){
  return items.reduce((sum,item) => sum + signedAmount(item),0);
}

function sumBy(items,mode,type){
  return items
    .filter(item => item.mode === mode && item.type === type)
    .reduce((sum,item) => sum + Math.abs(item.amount),0);
}

// ===== localStorage =====================================================
function loadData(){
  const savedTransactions = JSON.parse(localStorage.getItem(STORAGE.transactions)) || null;
  diaries = JSON.parse(localStorage.getItem(STORAGE.diaries)) || [];
  planList = (
    JSON.parse(localStorage.getItem(STORAGE.planList)) ||
    JSON.parse(localStorage.getItem('wishList')) ||
    []
  ).map(normalizePlan);

  if(savedTransactions){
    transactions = savedTransactions.map(normalizeTransaction);
    return;
  }

  // 旧データ互換: records は実績、schedules/budgets は予算へ移行。
  const records = JSON.parse(localStorage.getItem('records')) || [];
  const schedules = JSON.parse(localStorage.getItem('schedules')) || [];
  const budgets = JSON.parse(localStorage.getItem('budgets')) || [];

  transactions = [
    ...records.map(record => normalizeTransaction({
      mode:'actual',
      type:record.type || (Number(record.amount) < 0 ? 'expense' : 'income'),
      title:record.title || record.desc || '',
      category:record.category || 'その他',
      amount:Math.abs(Number(record.amount) || 0),
      date:record.date || today,
      repeat:'none',
      createdAt:Date.now()
    })),
    ...[...schedules,...budgets].map(schedule => normalizeTransaction({
      mode:schedule.mode || 'budget',
      type:schedule.type || 'expense',
      title:schedule.title || schedule.desc || '',
      category:schedule.category || 'その他',
      amount:Math.abs(Number(schedule.amount) || 0),
      date:schedule.startDate || schedule.date || today,
      repeat:schedule.repeat || schedule.repeatType || 'none',
      weeklyDays:schedule.weeklyDays,
      monthlyDay:schedule.monthlyDay,
      yearlyMonth:schedule.yearlyMonth,
      yearlyDay:schedule.yearlyDay,
      createdAt:Date.now()
    }))
  ];

  saveData();
}

function normalizeTransaction(tx){
  const date = tx.date || today;
  const parsed = parseDate(date);
  const repeat = tx.repeat || 'none';

  return {
    id:tx.id || makeId(),
    mode:tx.mode === 'actual' ? 'actual' : 'budget',
    type:tx.type === 'income' ? 'income' : 'expense',
    title:tx.title || tx.desc || '名称なし',
    category:tx.category || 'その他',
    amount:Math.abs(Number(tx.amount) || 0),
    date,
    repeat,
    weeklyDays:repeat === 'weekly'
      ? normalizeWeeklyDays(tx.weeklyDays,parsed.getDay())
      : [],
    monthlyDay:repeat === 'monthly' ? Number(tx.monthlyDay || parsed.getDate()) : null,
    yearlyMonth:repeat === 'yearly' ? Number(tx.yearlyMonth || parsed.getMonth() + 1) : null,
    yearlyDay:repeat === 'yearly' ? Number(tx.yearlyDay || parsed.getDate()) : null,
    planId:tx.planId || tx.wishId || '',
    createdAt:Number(tx.createdAt) || Date.now()
  };
}

function normalizePlan(plan){
  return {
    id:plan.id || makeId(),
    title:plan.title || '名称なし',
    planType:(plan.planType || plan.type) === 'goal' ? 'goal' : 'buy',
    targetAmount:Math.abs(Number(plan.targetAmount) || 0),
    category:plan.category || 'その他',
    memo:plan.memo || '',
    status:plan.status === 'done' ? 'done' : 'active',
    createdAt:Number(plan.createdAt) || Date.now()
  };
}

function saveData(){
  localStorage.setItem(STORAGE.transactions,JSON.stringify(transactions));
  localStorage.setItem(STORAGE.diaries,JSON.stringify(diaries));
  localStorage.setItem(STORAGE.planList,JSON.stringify(planList));
}

// ===== テーマ管理 =======================================================
// CSS変数だけを差し替えるので、HTML構造を壊さず色だけ変更できます。
function applyTheme(themeName){
  const aliases = {
    blue:'minimal',
    green:'minimal',
    purple:'paper',
    orange:'paper',
    dark:'tokyo'
  };
  const normalized = aliases[themeName] || themeName || 'minimal';
  const allowed = ['minimal','tokyo','paper','retro'];
  const theme = allowed.includes(normalized) ? normalized : 'minimal';
  document.body.dataset.theme = theme;
  document.querySelectorAll('[data-theme-button]').forEach(button => {
    button.classList.toggle('active',button.dataset.themeButton === theme);
  });
}

function changeTheme(themeName){
  applyTheme(themeName);
  localStorage.setItem(STORAGE.theme,document.body.dataset.theme || 'minimal');
}

function loadTheme(){
  applyTheme(localStorage.getItem(STORAGE.theme) || 'minimal');
}

// 左パネルの各メニューを起動時に折りたたみグループ化します。
// HTMLを増やしすぎず、iPadで必要な入力だけ開ける状態にします。
function setupMenus(){
  const titles = [...document.querySelectorAll('.menu-title')];
  titles.forEach((title,index) => {
    if(title.dataset.ready) return;
    title.dataset.ready = 'true';
    title.classList.add(['budget-title','actual-title','fixed-title','diary-title','plan-title'][index] || '');

    const body = document.createElement('div');
    body.className = 'menu-body';
    let node = title.nextElementSibling;
    while(node && !node.classList.contains('menu-title')){
      const next = node.nextElementSibling;
      body.appendChild(node);
      node = next;
    }
    title.after(body);
    title.addEventListener('click',() => toggleMenuBody(title,body));
  });
}

function toggleRightAccordion(id){
  const content = getEl(id);
  const button = content.previousElementSibling;
  content.classList.toggle('open');
  button.classList.toggle('open');
}

function toggleMenuBody(title,body){
  document.querySelectorAll('.menu-body').forEach(item => {
    if(item !== body) item.classList.remove('open');
  });
  document.querySelectorAll('.menu-title').forEach(item => {
    if(item !== title) item.classList.remove('open');
  });
  body.classList.toggle('open');
  title.classList.toggle('open');
  closeAllForms();
}

// ===== 繰り返し展開 =====================================================
function isTransactionMatchDate(tx,date){
  const start = parseDate(tx.date);
  if(date < start) return false;

  if(tx.repeat === 'none'){
    return toDateString(date) === tx.date;
  }

  if(tx.repeat === 'daily'){
    return true;
  }

  if(tx.repeat === 'weekly'){
    return normalizeWeeklyDays(tx.weeklyDays,start.getDay()).includes(date.getDay());
  }

  if(tx.repeat === 'monthly'){
    return date.getDate() === Number(tx.monthlyDay);
  }

  if(tx.repeat === 'yearly'){
    return (
      date.getMonth() + 1 === Number(tx.yearlyMonth) &&
      date.getDate() === Number(tx.yearlyDay)
    );
  }

  return false;
}

function expandTransactionsForDate(date){
  const dateString = toDateString(date);
  return transactions
    .map((tx,index) => ({...tx,index,occurrenceDate:dateString}))
    .filter(tx => isTransactionMatchDate(tx,date));
}

function expandTransactionsForMonth(year,month){
  const lastDay = new Date(year,month + 1,0).getDate();
  const items = [];

  for(let day = 1; day <= lastDay; day++){
    items.push(...expandTransactionsForDate(new Date(year,month,day)));
  }

  return items;
}

// ===== transaction CRUD =================================================
function updateTransaction(id,updatedData){
  const index = transactions.findIndex(tx => tx.id === id);
  if(index === -1) return;
  transactions[index] = normalizeTransaction({
    ...transactions[index],
    ...updatedData,
    id
  });
  saveData();
  renderAll();
}

function deleteTransactionById(id){
  const tx = transactions.find(item => item.id === id);
  if(!tx) return;

  if(tx.repeat !== 'none'){
    const ok = confirm('この固定費定義を削除しますか？');
    if(!ok) return;
  }

  transactions = transactions.filter(item => item.id !== id);
  if(editingTransactionId === id){
    hideEditModal();
  }
  saveData();
  renderAll();
}

function convertBudgetToActual(id,occurrenceDate){
  const budget = transactions.find(tx => tx.id === id);
  if(!budget || budget.mode !== 'budget') return;

  transactions.push(normalizeTransaction({
    mode:'actual',
    type:budget.type,
    title:budget.title,
    category:budget.category,
    amount:budget.amount,
    date:occurrenceDate,
    repeat:'none',
    createdAt:Date.now()
  }));

  saveData();
  renderAll();
}

// ===== サマリー =========================================================
function getMonthSummary(){
  const expanded = expandTransactionsForMonth(calendarYear,calendarMonth);
  const budgetIncome = sumBy(expanded,'budget','income');
  const budgetExpense = sumBy(expanded,'budget','expense');
  const actualIncome = sumBy(expanded,'actual','income');
  const actualExpense = sumBy(expanded,'actual','expense');
  const budgetBalance = budgetIncome - budgetExpense;
  const actualBalance = actualIncome - actualExpense;

  return {
    budgetIncome,
    budgetExpense,
    actualIncome,
    actualExpense,
    budgetBalance,
    actualBalance,
    variance:actualBalance - budgetBalance
  };
}

function renderSummary(){
  const s = getMonthSummary();
  getEl('monthTitle').textContent = `${calendarYear}年${calendarMonth + 1}月 予実サマリー`;

  getEl('summary').innerHTML = `

        ${summaryCard('予算支出',s.budgetExpense,'budget-text')}
        ${summaryCard('実績収入',s.actualIncome,'plus')}
        ${summaryCard('実績支出',s.actualExpense,'minus')}
      </div>
      <div class="summary-balance">

        <span>実績収支 ${yen(s.actualBalance)}</span>
      </div>
      <div class="summary-balance">
        <span>差額</span>
        <span class="${s.variance < 0 ? 'minus' : 'plus'}">${yen(s.variance)}</span>

  `;

  const content = getEl('expenseAnalysis');

function getCategoryExpenseAnalysis(){
  const items = expandTransactionsForMonth(calendarYear,calendarMonth);
  const map = new Map();
  const totalDays = getMonthDayCount(calendarYear,calendarMonth);
  const cutoffDay = getAnalysisCutoffDay(calendarYear,calendarMonth);

  items.forEach(item => {
    if(item.type !== 'expense') return;
    const category = item.category || 'その他';
    if(!map.has(category)){
      map.set(category,{category,budget:0,actual:0});
    }
    const row = map.get(category);

    if(item.mode === 'budget'){
      row.budget += Math.abs(item.amount);
    }

    if(item.mode === 'actual' && isOnOrBeforeCutoff(item,cutoffDay)){
      row.actual += Math.abs(item.amount);
    }
  });

  const rows = [...map.values()];
  return rows
    .filter(row => row.budget > 0 || row.actual > 0)
    .map(row => ({
      ...row,
      allowance:row.category === '固定費'
        ? row.budget
        : Math.round(row.budget / totalDays * cutoffDay),
      cutoffDay,
      totalDays,
      color:CATEGORY_COLORS[row.category] || CATEGORY_COLORS['その他']
    }))
    .map(row => {
      const progress = row.allowance > 0
        ? Math.round(row.actual / row.allowance * 100)
        : (row.actual > 0 ? 999 : 0);
      return {
        ...row,
        progress,
        barWidth:Math.min(progress,100),
        isOver:row.allowance > 0 ? row.actual > row.allowance : row.actual > 0
      };
    })
    .sort((a,b) => {
      if(a.isOver !== b.isOver) return a.isOver ? -1 : 1;
      return b.actual - a.actual;
    });
}

function renderExpenseAnalysis(){
  const rows = getCategoryExpenseAnalysis();
  if(!rows.length){
    return '<div class="empty">この月の支出データはまだありません</div>';
  }

  const cutoffDay = rows[0].cutoffDay;
  const totalDays = rows[0].totalDays;
  const lead = cutoffDay > 0
    ? `${calendarMonth + 1}月${cutoffDay}日時点の予算進捗です。固定費は月予算そのままで比較します。`
    : '未来月のため、今日時点の実績比較はまだありません。';

  const details = rows.map(row => {
    const overText = row.isOver
      ? `<div class="analysis-warning">⚠ ${row.category}が今日時点予算を超過しています</div>`
      : '';
    const allowanceLabel = row.category === '固定費'
      ? '月予算'
      : `今日許容`;
    const progressLabel = row.progress >= 999 ? '予算未設定' : `${row.progress}%`;
    return `
      <div class="analysis-row">
        <div class="analysis-name">
          <span><span class="analysis-dot" style="background:${row.color}"></span>${row.category}</span>
          <span class="${row.isOver ? 'analysis-over' : ''}">${progressLabel}</span>
        </div>
        <div class="progress-bar" aria-label="${row.category}の予算進捗">
          <div class="progress-fill ${row.isOver ? 'over' : ''}" style="width:${row.barWidth}%;background:${row.isOver ? 'var(--expense)' : row.color}"></div>
        </div>
        <div class="analysis-meta">
          <span>現在 ${yen(row.actual)}</span>
          <span>${allowanceLabel} ${yen(row.allowance)}</span>
          <span>月予算 ${yen(row.budget)}</span>
        </div>
        ${overText}
      </div>
    `;
  }).join('');

  return `<p class="analysis-lead">${lead}</p>${details}`;
}

// ===== カレンダー / 選択日 ==============================================
function changeMonth(diff){
  calendarMonth += diff;

  if(calendarMonth < 0){
    calendarMonth = 11;
    calendarYear--;
  }

  if(calendarMonth > 11){
    calendarMonth = 0;
    calendarYear++;
  }

  selectedDate = `${calendarYear}-${String(calendarMonth + 1).padStart(2,'0')}-01`;
  renderAll();
}

function selectDate(dateString){
  selectedDate = dateString;
  renderAll();
  showDateDetailModal();
}

function showDateDetailModal(){
  getEl('dateDetailModal').classList.add('show');
}

function closeDateDetailModal(event){
  if(event.target.id === 'dateDetailModal'){
    hideDateDetailModal();
  }
}

function hideDateDetailModal(){
  getEl('dateDetailModal').classList.remove('show');
}

function renderCalendar(){
  const calendar = getEl('calendar');
  const firstDay = new Date(calendarYear,calendarMonth,1);
  const lastDay = new Date(calendarYear,calendarMonth + 1,0);
  const weekNames = ['日','月','火','水','木','金','土'];

  calendar.innerHTML = weekNames.map(day => `<div class="week-name">${day}</div>`).join('');

  for(let i = 0; i < firstDay.getDay(); i++){
    calendar.insertAdjacentHTML('beforeend','<div></div>');
  }

  for(let day = 1; day <= lastDay.getDate(); day++){
    const date = new Date(calendarYear,calendarMonth,day);
    const dateString = toDateString(date);
    const items = expandTransactionsForDate(date);
    const budgetTotal = sumSigned(items.filter(item => item.mode === 'budget'));
    const actualTotal = sumSigned(items.filter(item => item.mode === 'actual'));
    const budgetCount = items.filter(item => item.mode === 'budget').length;
    const actualCount = items.filter(item => item.mode === 'actual').length;
    const fixedCount = items.filter(item => item.repeat !== 'none').length;

    calendar.insertAdjacentHTML('beforeend',`
      <div class="calendar-day ${dateString === today ? 'today' : ''} ${dateString === selectedDate ? 'selected' : ''}" onclick="selectDate('${dateString}')">
        <div class="calendar-date">${day}</div>
        <div class="day-total">
          <div class="day-total-row">
            <span>予算</span>
            <span class="${budgetTotal < 0 ? 'budget-text' : 'plus'}">${yen(budgetTotal)}</span>
          </div>
          <div class="day-total-row">
            <span>実績</span>
            <span class="${actualTotal < 0 ? 'minus' : 'actual-text'}">${yen(actualTotal)}</span>
          </div>
        </div>
        <div class="day-dots">
          ${renderDotLine('予算',budgetCount,'budget')}
          ${renderDotLine('実績',actualCount,'actual')}
          ${renderDotLine('固定',fixedCount,'fixed')}
        </div>
      </div>
    `);
  }
}

function renderDotLine(label,count,type){
  if(!count) return '';
  const dots = Array.from({length:Math.min(count,6)},() => `<span class="dot ${type}"></span>`).join('');
  return `<div class="dot-line"><span>${label}</span>${dots}<span>${count}件</span></div>`;
}

function renderCalendarItem(item){
  const amount = signedAmount(item);
  const isActual = item.mode === 'actual';
  const isIncome = item.type === 'income';

  return `
    <div class="entry-chip ${isActual ? 'actual' : ''} ${isIncome ? 'income' : ''}">
      <div class="entry-title">${item.title}</div>
      <div>
        <strong class="${amount < 0 ? 'minus' : 'plus'}">${yen(amount)}</strong>
      </div>
      <div class="entry-meta">${modeLabel(item.mode)} / ${item.category}</div>
    </div>
  `;
}

function renderSelectedDateDetails(dateString){
  const items = expandTransactionsForDate(parseDate(dateString));
  const budgets = items.filter(item => item.mode === 'budget' && item.repeat === 'none');
  const actuals = items.filter(item => item.mode === 'actual' && item.repeat === 'none');
  const fixed = items.filter(item => item.repeat !== 'none');
  const label = `${parseDate(dateString).getMonth() + 1}/${parseDate(dateString).getDate()}`;

  getEl('selectedDatePanel').innerHTML = `
    <div class="detail-header">
      <h2 class="section-title">${label} の詳細</h2>
      <button class="mini-button btn-light" onclick="hideDateDetailModal()">閉じる</button>
    </div>
    <div class="detail-group">
      <h3>その日の予算</h3>
      ${budgets.length ? budgets.map(renderDetailItem).join('') : '<div class="empty">予算はありません</div>'}
    </div>
    <div class="detail-group">
      <h3>その日の実績</h3>
      ${actuals.length ? actuals.map(renderDetailItem).join('') : '<div class="empty">実績はありません</div>'}
    </div>
    <div class="detail-group">
      <h3>固定費 / 繰り返し</h3>
      ${fixed.length ? fixed.map(renderDetailItem).join('') : '<div class="empty">固定費はありません</div>'}
    </div>
  `;
}

function renderDetailItem(item){
  const amount = signedAmount(item);
  const plan = item.planId ? planList.find(plan => plan.id === item.planId) : null;
  return `
    <div class="detail-item ${item.mode}">
      <div class="history-head">
        <span>${modeLabel(item.mode)} ${typeLabel(item.type)}</span>
        <span>${repeatLabel(item)}</span>
      </div>
      <div class="history-title">${item.title}</div>
      <div class="tag-row">
        <span class="tag">${item.category}</span>
        <span class="tag">${item.occurrenceDate}</span>
        ${plan ? `<span class="tag">計画: ${plan.title}</span>` : ''}
      </div>
      <div class="history-amount ${amount < 0 ? 'minus' : 'plus'}">${yen(amount)}</div>
      <div class="detail-actions">
        ${
          item.mode === 'budget'
          ? `<button class="mini-button btn-actual" onclick="convertBudgetToActual('${item.id}','${item.occurrenceDate}')">実績化</button>`
          : ''
        }
        <button class="mini-button btn-light" onclick="openEditModal('${item.id}')">編集</button>
        <button class="mini-button btn-delete" onclick="deleteTransactionById('${item.id}')">削除</button>
      </div>
    </div>
  `;
}

// ===== 履歴 =============================================================
function renderHistory(){
  const monthItems = expandTransactionsForMonth(calendarYear,calendarMonth)
    .sort((a,b) => b.occurrenceDate.localeCompare(a.occurrenceDate) || b.createdAt - a.createdAt);

  getEl('historyList').innerHTML = monthItems.length
    ? monthItems.map(item => {
      const amount = signedAmount(item);
      return `
        <div class="history-card">
          <div class="history-head">
            <span>${item.occurrenceDate}</span>
            <span>${modeLabel(item.mode)} ${typeLabel(item.type)}</span>
          </div>
          <div class="history-title">${item.title}</div>
          <div class="tag-row">
            <span class="tag">${item.category}</span>
            <span class="tag">${repeatLabel(item)}</span>
          </div>
          <div class="history-amount ${amount < 0 ? 'minus' : 'plus'}">${yen(amount)}</div>
          <div class="detail-actions">
            <button class="mini-button btn-light" onclick="openEditModal('${item.id}')">編集</button>
            <button class="mini-button btn-delete" onclick="deleteTransactionById('${item.id}')">削除</button>
          </div>
        </div>
      `;
    }).join('')
    : '<div class="empty">この月の家計データはまだありません</div>';
}

// ===== Plan / Goal ======================================================
function openPlanForm(type){
  openForm('planForm');
  getEl('planType').value = type;
  getEl('planEditId').value = '';
  getEl('planTitle').value = '';
  getEl('planTargetAmount').value = '';
  getEl('planCategory').value = '旅行';
  getEl('planMemo').value = '';
}

function savePlan(event){
  event.preventDefault();
  const id = getEl('planEditId').value || makeId();
  const data = normalizePlan({
    id,
    title:getEl('planTitle').value.trim(),
    planType:getEl('planType').value,
    targetAmount:Number(getEl('planTargetAmount').value),
    category:getEl('planCategory').value,
    memo:getEl('planMemo').value.trim(),
    status:planList.find(plan => plan.id === id)?.status || 'active',
    createdAt:planList.find(plan => plan.id === id)?.createdAt || Date.now()
  });

  const index = planList.findIndex(plan => plan.id === id);
  if(index >= 0){
    planList[index] = data;
  }else{
    planList.push(data);
  }

  closeAllForms();
  saveData();
  buildTransactionForms();
  renderAll();
}

function editPlan(id){
  const plan = planList.find(item => item.id === id);
  if(!plan) return;
  hidePlanModal();
  openForm('planForm');
  getEl('planType').value = plan.planType;
  getEl('planEditId').value = plan.id;
  getEl('planTitle').value = plan.title;
  getEl('planTargetAmount').value = plan.targetAmount;
  getEl('planCategory').value = plan.category || 'その他';
  getEl('planMemo').value = plan.memo;
}

function deletePlan(id){
  const ok = confirm('この計画を削除しますか？ 関連付けられた予算は「関連なし」に戻ります。');
  if(!ok) return;
  planList = planList.filter(plan => plan.id !== id);
  transactions = transactions.map(tx => tx.planId === id ? {...tx,planId:''} : tx);
  saveData();
  buildTransactionForms();
  renderAll();
}

function togglePlanDone(id){
  const plan = planList.find(item => item.id === id);
  if(!plan) return;
  plan.status = plan.status === 'done' ? 'active' : 'done';
  saveData();
  renderPlanList();
}

function showPlanModal(){
  renderPlanList();
  getEl('planModal').classList.add('show');
}

function closePlanModal(event){
  if(event.target.id === 'planModal'){
    hidePlanModal();
  }
}

function hidePlanModal(){
  getEl('planModal').classList.remove('show');
}

function getPlanPlannedAmount(planId){
  return transactions
    .filter(tx => tx.mode === 'budget' && tx.planId === planId)
    .reduce((sum,tx) => sum + Math.abs(tx.amount),0);
}

function renderPlanList(){
  getEl('planListView').innerHTML = planList.length
    ? planList.map(plan => {
      return `
        <div class="plan-card ${plan.status === 'done' ? 'done' : ''}">
          <h3>${plan.title}</h3>
          <div class="plan-meta">
            ${plan.planType === 'buy' ? '買いたいもの' : 'やりたいこと'} / ${plan.status === 'done' ? '達成済み' : '未完了'}<br>
            カテゴリ: ${plan.category}<br>
            予定金額: ${yen(plan.targetAmount)}
          </div>
          ${plan.memo ? `<div class="plan-meta">${plan.memo}</div>` : ''}
          <div class="plan-actions">
            <button class="mini-button btn-light" onclick="editPlan('${plan.id}')">編集</button>
            <button class="mini-button btn-delete" onclick="deletePlan('${plan.id}')">削除</button>
            <button class="mini-button btn-actual" onclick="togglePlanDone('${plan.id}')">
              ${plan.status === 'done' ? '未完了に戻す' : '完了'}
            </button>
          </div>
        </div>
      `;
    }).join('')
    : '<div class="empty">計画一覧はまだありません</div>';
}

// ===== 日記 =============================================================
function selectMood(button,moodValue){
  getEl('mood').value = moodValue;
  document.querySelectorAll('#moodSelect button').forEach(btn => btn.classList.remove('active'));
  button.classList.add('active');
}

function saveDiary(){
  const text = getEl('diaryInput').value.trim();
  if(!text) return;

  const editId = getEl('diaryEditId').value;
  if(editId){
    const diary = diaries.find(item => item.id === editId);
    if(diary){
      diary.text = text;
      diary.mood = getEl('mood').value || diary.mood || '😐';
    }
  }else{
    diaries.unshift({
      id:makeId(),
      date:today,
      mood:getEl('mood').value || '😐',
      text,
      createdAt:Date.now()
    });
  }

  getEl('diaryInput').value = '';
  getEl('mood').value = '';
  getEl('diaryEditId').value = '';
  document.querySelectorAll('#moodSelect button').forEach(btn => btn.classList.remove('active'));
  closeAllForms();
  saveData();
  renderDiaries();
}

function editDiary(index){
  const diary = diaries[index];
  if(!diary) return;
  openForm('diaryForm');
  getEl('diaryEditId').value = diary.id;
  getEl('diaryInput').value = diary.text;
  getEl('mood').value = diary.mood || '😐';
}

function deleteDiary(index){
  diaries.splice(index,1);
  saveData();
  renderDiaries();
}

function renderDiaries(){
  getEl('diaryList').innerHTML = diaries.length
    ? diaries.map((diary,index) => `
      <div class="diary-card">
        <div class="history-head">
          <span>${diary.date}</span>
          <span>${diary.mood}</span>
        </div>
        <div>${diary.text}</div>
        <button class="mini-button btn-light" onclick="editDiary(${index})">編集</button>
        <button class="mini-button btn-delete" onclick="deleteDiary(${index})">削除</button>
      </div>
    `).join('')
    : '<div class="empty">まだ日記がありません</div>';
}

// ===== 描画入口 =========================================================
function renderAll(){
  renderSummary();
  renderCalendar();
  renderSelectedDateDetails(selectedDate);
  renderPlanList();
  renderHistory();
  renderDiaries();
}

loadData();
setup();
</script>
</body>
</html>
